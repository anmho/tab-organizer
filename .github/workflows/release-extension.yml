name: Release Chrome Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build packaged extension
        run: npm run package

      - name: Rename release asset
        run: cp build/chrome-mv3-prod.zip build/tab-organizer-${{ github.ref_name }}.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/tab-organizer-${{ github.ref_name }}.zip
          generate_release_notes: true
